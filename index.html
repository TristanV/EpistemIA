<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EpistemIA — Base de connaissances sur l'IA</title>
<meta name="description" content="EpistemIA — Graphe épistémologique interactif retraçant l'histoire, les techniques, les fondements mathématiques et l'évolution de l'Intelligence Artificielle.">
<!-- Dépendances externes -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@400,500,700&display=swap" rel="stylesheet">
<!-- Design graphique -->
<link rel="stylesheet" href="./style.css">
</head>
<body>

<header id="header">
  <div id="logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="EpistemIA">
      <circle cx="14" cy="14" r="13" stroke="var(--color-primary)" stroke-width="1.5"/>
      <circle cx="14" cy="14" r="3.5" fill="var(--color-primary)"/>
      <circle cx="6"  cy="9"  r="2.2" fill="var(--color-primary)" opacity=".6"/>
      <circle cx="22" cy="9"  r="2.2" fill="var(--color-primary)" opacity=".6"/>
      <circle cx="6"  cy="19" r="2.2" fill="var(--color-primary)" opacity=".4"/>
      <circle cx="22" cy="19" r="2.2" fill="var(--color-primary)" opacity=".4"/>
      <line x1="8" y1="10" x2="11.5" y2="12.5" stroke="var(--color-primary)" stroke-width="1.2" opacity=".5"/>
      <line x1="20" y1="10" x2="16.5" y2="12.5" stroke="var(--color-primary)" stroke-width="1.2" opacity=".5"/>
      <line x1="8" y1="18" x2="11.5" y2="15.5" stroke="var(--color-primary)" stroke-width="1.2" opacity=".35"/>
      <line x1="20" y1="18" x2="16.5" y2="15.5" stroke="var(--color-primary)" stroke-width="1.2" opacity=".35"/>
    </svg>
    EpistemIA <span style="font-size:var(--text-xs);color:var(--color-text-muted);font-weight:400;margin-left:.25rem">v2.1</span>
  </div>
  <div id="header-actions">
    <span id="node-count" style="font-size:var(--text-xs);color:var(--color-text-muted)"></span>
    <button class="icon-btn" id="toggle-legend-btn" title="Légende des arcs">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </button>
    <button class="icon-btn" data-theme-toggle aria-label="Basculer le thème">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<div id="main">
  <aside id="sidebar">
    <div id="stats-bar">
      <span id="stat-nodes">…</span> nœuds · <span id="stat-edges">…</span> arcs
    </div>

    <div class="filter-section">
      <div class="filter-label">Recherche</div>
      <input id="search-input" class="filter-search" type="search" placeholder="Label, auteur, tag…" aria-label="Recherche dans le graphe">
    </div>

    <div class="filter-section">
      <div class="filter-label">Période (année)</div>
      <div class="range-row">
        <input id="year-min" class="range-input" type="number" placeholder="Début" value="-100000" aria-label="Année de début">
        <span style="color:var(--color-text-faint);font-size:var(--text-xs)">→</span>
        <input id="year-max" class="range-input" type="number" placeholder="Fin" value="2026" aria-label="Année de fin">
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Simulation de forces</div>
      <button id="sim-toggle" class="sim-btn stopped" aria-label="Activer la simulation de forces">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor" id="sim-icon"><polygon points="2,1 11,6 2,11"/></svg>
        <span id="sim-label">Activer la simulation</span>
      </button>
    </div>

    <div class="filter-section">
      <div class="filter-label">Types de nœuds</div>
      <div id="node-type-filters" class="tag-grid"></div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Types de transitions</div>
      <div id="edge-type-filters" class="tag-grid"></div>
    </div>

    <button class="reset-btn" id="reset-btn">↺ Réinitialiser les filtres</button>
  </aside>

  <div id="graph-area" role="main" aria-label="Graphe épistémologique de l'IA">
    <svg id="graph-svg"></svg>
    <div id="graph-controls" aria-label="Contrôles du zoom">
      <button class="graph-ctrl-btn" id="zoom-in-btn" title="Zoom +" aria-label="Zoom avant">+</button>
      <button class="graph-ctrl-btn" id="zoom-out-btn" title="Zoom −" aria-label="Zoom arrière">−</button>
      <button class="graph-ctrl-btn" id="zoom-reset-btn" title="Vue initiale" aria-label="Réinitialiser la vue" style="font-size:10px">⌂</button>
    </div>
    <div id="legend" role="complementary" aria-label="Légende des transitions">
      <div style="font-size:10px;font-weight:700;margin-bottom:.4rem;color:var(--color-text)">Transitions</div>
      <div id="legend-content"></div>
    </div>
  </div>

  <aside id="detail-panel" role="complementary" aria-label="Détail du nœud sélectionné">
    <div id="detail-inner"></div>
  </aside>
</div>

<div id="tooltip" role="tooltip"></div>

<!--
  Bootstrap ES-module :
  1. Importe buildFullGraph() depuis le manifeste resources/index.js
  2. Expose le graphe complet en variable globale window.GRAPH_DATA
  3. Charge dynamiquement app.js (script classique) une fois les données prêtes
  Cette approche permet de passer au système multi-fichiers sans réécrire app.js.
-->
<script type="module">
  import { buildFullGraph } from './resources/index.js';
  window.GRAPH_DATA = buildFullGraph();

  const appScript = document.createElement('script');
  appScript.src = './app.js';
  document.body.appendChild(appScript);
</script>

</body>
</html>
